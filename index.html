<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>🎮 HERMES 3D TRADING TERMINAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
.hud-panel{
  position:absolute;
  background:rgba(0,10,0,0.85);
  border:1px solid rgba(0,255,0,0.4);
  border-radius:4px;
  padding:10px 14px;
  color:#0f0;
  font-size:11px;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px rgba(0,255,0,0.15),inset 0 0 20px rgba(0,255,0,0.05);
  pointer-events:auto;
}
.hud-panel .title{color:#ff0;font-size:10px;font-weight:bold;margin-bottom:6px;letter-spacing:2px;text-shadow:0 0 10px rgba(255,255,0,0.5)}
.hud-panel .val{color:#0f0;font-size:16px;font-weight:bold;text-shadow:0 0 8px rgba(0,255,0,0.6)}
.hud-panel .val.gold{color:#ff0;font-size:20px}
.hud-panel .row{display:flex;justify-content:space-between;margin:2px 0;gap:12px}
.hud-panel .label{color:rgba(0,255,0,0.6);font-size:8px}
.hud-panel .data{color:#0f0;font-size:10px;text-align:right}
#balance-panel{top:15px;left:15px}
#status-panel{top:15px;right:15px;text-align:right}
#agents-panel{bottom:15px;left:15px;min-width:180px}
#positions-panel{bottom:15px;right:15px}
#center-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
#center-title .main{font-size:14px;color:#0f0;text-shadow:0 0 20px #0f0,0 0 40px #0a0;letter-spacing:4px}
#center-title .sub{font-size:8px;color:rgba(0,255,0,0.5);margin-top:4px}
.agent-dot{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:8px}
.agent-dot .dot{width:6px;height:6px;border-radius:50%}
.agent-dot .dot.on{background:#0f0;box-shadow:0 0 6px #0f0}
.agent-dot .dot.standby{background:#ff0;box-shadow:0 0 6px #ff0}
.blink{animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#0f0;font-size:12px;z-index:100;letter-spacing:3px}
#loading.hidden{display:none}

@media(max-width:600px){
  .hud-panel{padding:6px 10px;font-size:9px}
  .hud-panel .val{font-size:13px}
  .hud-panel .val.gold{font-size:16px}
  #center-title .main{font-size:10px}
}
</style>
</head>
<body>
<div id="loading">INITIALIZING...</div>

<div id="hud">
  <div class="hud-panel" id="balance-panel">
    <div class="title">💰 BALANCE</div>
    <div class="val gold" id="bal">0.1354 SOL</div>
    <div class="row"><span class="label">USD</span><span class="data">~$10.93</span></div>
    <div class="row"><span class="label">POSITIONS</span><span class="data">0</span></div>
  </div>

  <div class="hud-panel" id="status-panel">
    <div class="title">📊 MARKET</div>
    <div class="row"><span class="label">SOL/USD</span><span class="data" id="solPrice">$80.72</span></div>
    <div class="row"><span class="label">24H</span><span class="data" style="color:#f44" id="sol24h">-3.5%</span></div>
    <div class="row"><span class="label">P&L</span><span class="data" style="color:#0f0">+0.00 SOL</span></div>
    <div class="row"><span class="label">TRADES</span><span class="data">0</span></div>
  </div>

  <div class="hud-panel" id="agents-panel">
    <div class="title">🤖 AGENTS</div>
    <div class="agent-dot"><span class="dot on"></span> SCANNER <span style="color:#0f0;margin-left:auto">ACTIVE</span></div>
    <div class="agent-dot"><span class="dot standby"></span> ANALYST <span style="color:#ff0;margin-left:auto">READY</span></div>
    <div class="agent-dot"><span class="dot standby"></span> EXECUTOR <span style="color:#ff0;margin-left:auto">READY</span></div>
    <div class="agent-dot"><span class="dot on"></span> MONITOR <span style="color:#0f0;margin-left:auto">ACTIVE</span></div>
  </div>

  <div class="hud-panel" id="positions-panel">
    <div class="title">📈 POSITIONS</div>
    <div style="color:rgba(0,255,0,0.3);font-size:9px;text-align:center">NO ACTIVE<br>POSITIONS</div>
  </div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// Hide loading
setTimeout(()=>document.getElementById('loading').classList.add('hidden'),800);

// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000,0.00008);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,2.5,8);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

// LIGHTS
const ambient = new THREE.AmbientLight(0x002200,1.5);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0x00ff00,3);
dirLight.position.set(5,10,5);
dirLight.castShadow=true;
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x00ff00,20,15);
pointLight.position.set(0,2,0);
scene.add(pointLight);

// GRID FLOOR
const gridHelper = new THREE.PolarGridHelper(8,32,24,128,0x003300,0x001100);
scene.add(gridHelper);

// NEON GRID LINES
const floorGeo = new THREE.PlaneGeometry(16,16);
const floorMat = new THREE.ShaderMaterial({
  uniforms:{time:{value:0}},
  vertexShader:`
    varying vec2 vUv;
    void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}
  `,
  fragmentShader:`
    varying vec2 vUv;
    uniform float time;
    void main(){
      vec2 p=vUv*16.0;
      float gx=smoothstep(0.02,0.0,abs(fract(p.x)-0.5))*0.3;
      float gy=smoothstep(0.02,0.0,abs(fract(p.y)-0.5))*0.3;
      float g=max(gx,gy);
      float d=length(vUv-0.5)*2.0;
      g*=1.0-d*0.7;
      gl_FragColor=vec4(0.0,g*0.5,0.0,g*0.15);
    }
  `,
  transparent:true,depthWrite:false
});
const floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;
floor.position.y=-2.5;
scene.add(floor);

// 3D SOLANA COIN
const coinGroup = new THREE.Group();
scene.add(coinGroup);

// Coin body
const coinGeo = new THREE.CylinderGeometry(1,1,0.15,64);
const coinMat = new THREE.MeshStandardMaterial({
  color:0x9945FF,
  metalness:0.9,
  roughness:0.15,
  emissive:0x220044,
  emissiveIntensity:0.4
});
const coin = new THREE.Mesh(coinGeo,coinMat);
coin.castShadow=true;
coinGroup.add(coin);

// Coin edge ring
const ringGeo = new THREE.TorusGeometry(1,0.04,16,64);
const ringMat = new THREE.MeshStandardMaterial({color:0x14F195,metalness:1,roughness:0.1,emissive:0x14F195,emissiveIntensity:1.5});
const ring = new THREE.Mesh(ringGeo,ringMat);
coinGroup.add(ring);

// SOL text plane
const solTexCanvas = document.createElement('canvas');
solTexCanvas.width=256;solTexCanvas.height=256;
const ctx=solTexCanvas.getContext('2d');
ctx.fillStyle='#14F195';
ctx.font='bold 100px "Press Start 2P", monospace';
ctx.textAlign='center';
ctx.fillText('SOL',128,140);
const solTex=new THREE.CanvasTexture(solTexCanvas);
const solPlaneGeo=new THREE.PlaneGeometry(1.6,1.6);
const solPlaneMat=new THREE.MeshStandardMaterial({map:solTex,transparent:true,emissive:0x14F195,emissiveIntensity:0.8,metalness:0.5,roughness:0.3});
const solPlane=new THREE.Mesh(solPlaneGeo,solPlaneMat);
solPlane.position.y=0.08;
coinGroup.add(solPlane);
const solPlane2=solPlane.clone();
solPlane2.position.y=-0.08;
solPlane2.rotation.y=Math.PI;
coinGroup.add(solPlane2);

// ORBITING PARTICLES around coin
const orbitParticles=[];
for(let i=0;i<24;i++){
  const pGeo=new THREE.SphereGeometry(0.03,8,8);
  const pMat=new THREE.MeshStandardMaterial({color:0x14F195,emissive:0x14F195,emissiveIntensity:2});
  const p=new THREE.Mesh(pGeo,pMat);
  p.userData={angle:(i/24)*Math.PI*2,radius:1.3+Math.random()*0.5,speed:0.5+Math.random()*1.5,yOffset:Math.random()*0.3};
  coinGroup.add(p);
  orbitParticles.push(p);
}

// BACKGROUND PARTICLES
const bgParticlesGeo=new THREE.BufferGeometry();
const bgCount=600;
const bgPositions=new Float32Array(bgCount*3);
for(let i=0;i<bgCount;i++){
  bgPositions[i*3]=(Math.random()-0.5)*16;
  bgPositions[i*3+1]=(Math.random()-0.5)*10;
  bgPositions[i*3+2]=(Math.random()-0.5)*12;
}
bgParticlesGeo.setAttribute('position',new THREE.BufferAttribute(bgPositions,3));
const bgParticlesMat=new THREE.PointsMaterial({color:0x00ff00,size:0.03,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending});
const bgParticles=new THREE.Points(bgParticlesGeo,bgParticlesMat);
scene.add(bgParticles);

// LASER RINGS
const rings=[];
for(let i=0;i<3;i++){
  const rGeo=new THREE.TorusGeometry(2+i*1.2,0.01,8,100);
  const rMat=new THREE.MeshBasicMaterial({color:0x00ff00,transparent:true,opacity:0.3-i*0.08});
  const r=new THREE.Mesh(rGeo,rMat);
  r.rotation.x=Math.PI/2;
  r.position.y=-2+i*0.2;
  rings.push(r);
  scene.add(r);
}

// HOLOGRAM BEAMS (vertical light columns)
for(let i=0;i<4;i++){
  const beamGeo=new THREE.CylinderGeometry(0.02,0.02,5,8);
  const beamMat=new THREE.MeshBasicMaterial({color:0x00ff00,transparent:true,opacity:0.15,blending:THREE.AdditiveBlending});
  const beam=new THREE.Mesh(beamGeo,beamMat);
  beam.position.set((Math.random()-0.5)*6,-0.5,(Math.random()-0.5)*6);
  scene.add(beam);
}

// MOUSE/TOUCH
let mouseX=0,mouseY=0,targetMouseX=0,targetMouseY=0;
window.addEventListener('mousemove',e=>{
  targetMouseX=(e.clientX/window.innerWidth)*2-1;
  targetMouseY=-(e.clientY/window.innerHeight)*2+1;
});
window.addEventListener('touchmove',e=>{
  targetMouseX=(e.touches[0].clientX/window.innerWidth)*2-1;
  targetMouseY=-(e.touches[0].clientY/window.innerHeight)*2+1;
},{passive:true});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ANIMATION LOOP
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Smooth mouse
  mouseX+=(targetMouseX-mouseX)*0.05;
  mouseY+=(targetMouseY-mouseY)*0.05;

  // Camera orbit
  const camRadius=7;
  const camAngle=t*0.15+mouseX*0.5;
  camera.position.x=Math.cos(camAngle)*camRadius;
  camera.position.z=Math.sin(camAngle)*camRadius;
  camera.position.y=2+mouseY*1.5;
  camera.lookAt(0,0,0);

  // Coin rotation
  coinGroup.rotation.y=t*0.8;
  coinGroup.rotation.x=Math.sin(t*0.3)*0.1;
  coin.position.y=Math.sin(t*1.5)*0.15;

  // Orbit particles
  orbitParticles.forEach(p=>{
    p.userData.angle+=p.userData.speed*0.02;
    const a=p.userData.angle;
    const r=p.userData.radius;
    p.position.x=Math.cos(a)*r;
    p.position.z=Math.sin(a)*r;
    p.position.y=Math.sin(t*2+a)*0.15+p.userData.yOffset;
  });

  // Floor shader time
  floorMat.uniforms.time.value=t;

  // Laser rings
  rings.forEach((r,i)=>{
    r.scale.setScalar(1+Math.sin(t*0.8+i)*0.08);
    r.material.opacity=0.25+Math.sin(t*0.6+i)*0.08;
  });

  // BG particles drift
  const pos=bgParticles.geometry.attributes.position.array;
  for(let i=0;i<bgCount;i++){
    pos[i*3+1]+=Math.sin(t+pos[i*3])*0.003;
    if(pos[i*3+1]>5)pos[i*3+1]=-5;
    if(pos[i*3+1]<-5)pos[i*3+1]=5;
  }
  bgParticles.geometry.attributes.position.needsUpdate=true;
  bgParticles.rotation.y+=0.0005;

  // Point light pulse
  pointLight.intensity=18+Math.sin(t*2)*3;

  renderer.render(scene,camera);

  // Update HUD clock
  const now=new Date();
  const ts=now.toTimeString().slice(0,8);
  document.getElementById('solPrice').textContent='$'+(80.72+Math.sin(t*0.3)*0.5).toFixed(2);
}

animate();

// Load complete
setTimeout(()=>document.getElementById('loading').classList.add('hidden'),1000);
</script>
</body>
</html>
